name: Keep Render API warm

# Laptop-independent 24/7 backup pinger for the Ground Control API.
# Render free tier sleeps after ~15 min idle; we ping every 5 minutes.
# NOTE: GitHub's scheduled cron can lag by several minutes under load, so for the
# LIVE demo window also run the tight local pinger:  python keep_warm.py <url>
#
# Setup: add a repository VARIABLE named GROUND_CONTROL_API_URL
#   (Repo → Settings → Secrets and variables → Actions → Variables → New variable)
#   value e.g. https://drone-ground-control-api.onrender.com

on:
  schedule:
    - cron: "*/5 * * * *"      # every 5 minutes
  workflow_dispatch: {}         # allow manual "Run workflow" before the demo

permissions:
  contents: read

concurrency:
  group: keep-warm
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        env:
          API_URL: ${{ vars.GROUND_CONTROL_API_URL }}
        run: |
          if [ -z "$API_URL" ]; then
            echo "::error::Repository variable GROUND_CONTROL_API_URL is not set."
            exit 1
          fi
          BASE="${API_URL%/}"
          echo "Pinging $BASE/health …"
          # Retry to absorb a cold start (free tier wake can take ~30–60 s).
          curl --fail --show-error --silent \
               --retry 5 --retry-delay 15 --retry-all-errors \
               --max-time 90 \
               "$BASE/health"
          echo ""
          echo "OK — API is awake."
